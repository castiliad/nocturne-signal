name: Nocturne Signal site contract
version: 0.1.0
owner_role: AgentSite maintenance agent
site:
  type: static_landing_page
  framework: Astro
  deploy_target: GitHub Pages
  repository_visibility: public_allowed
mission: >
  A dark techno-oracle GitHub Pages site for presenting projects, agent workflows, artifacts, and operating principles with verified static-site boundaries.
brief: >
  Create a dark, edgy, technical GitHub Pages static site for a personal AI/operator lab. It should feel like a techno-oracle command center: xAI-style monochrome restraint, Linear-level precision, VoltAgent terminal energy, and one signature kinetic typography / pretext-inspired hero. It must remain static, public-safe, no analytics, no tracking, no fake metrics, no fake testimonials.
audience:
  - "Technical collaborators reviewing AI/operator experiments"
  - "Hiring or project leads who need a credible technical signal without marketing fluff"
  - "Future agents maintaining the site from contracts, QA gates, and deploy evidence"
required_sections:
  - "hero"
  - "signal"
  - "systems"
  - "handoff"
  - "boundaries"
  - "artifacts"
  - "secondary_archive"
  - "pattern_lab"
  - "skill_matrix"
  - "search"
  - "runs"
  - "proof"
  - "next_step_cta"
recipe_registry:
  selected_recipes:
  - "product-cockpit"
  - "artifact-gallery"
  - "search-index"
  - "agent-run-ledger"
  - "copy-evidence-strip"
  - "primary-surface-layout"
  archetype: "product-cockpit"
  visual_preset: "cockpit-dark"
  auto_recipe_selection: "not requested; default recipe selection unchanged"
  note: Recipes are static-safe composition guidance and do not approve live data, analytics, payments, or unsupported claims.
content_rules:
  must_include:
    - static GitHub Pages delivery
    - repo-local QA
    - no-payment mode
  allowed_claims:
    - "Static GitHub Pages delivery"
    - "Public-safe artifact and project presentation"
    - "Repo-local QA and deploy verification"
    - "Agent-maintainable contracts and runbooks"
    - "No analytics, cookies, tracking, payment, or server runtime"
    - "Public-safe static-site experiments mapped to skills, recipes, and promotion rules"
  must_not_include:
    - "fake customer testimonials"
    - "fake usage metrics or benchmark numbers"
    - "live private telemetry"
    - "analytics or tracking"
    - "payments or lead capture"
    - "guaranteed uptime or security claims"
approval_required:
  - "Adding analytics, cookies, tracking pixels, or forms"
  - "Adding payment links, lead capture, or external scripts"
  - "Publishing private project details, customer names, or unsupported claims"
  - "Changing deployment target away from GitHub Pages"
qa:
  commands:
    - npm run qa
    - npm run build
verification:
  live_url: https://castiliad.github.io/nocturne-signal/
  expected_text: Nocturne Signal
